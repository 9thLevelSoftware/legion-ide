# Legion IDE — machine-readable Kanban backlog (P0–P9)
#
# Generated from .hermes/plans/2026-06-13_173122-legion-current-to-ga-kanban-plan.md
# (commit-era source of truth: 2026-06-13).
#
# Schema is TOML rather than YAML so validation can stay inside the
# workspace `toml` crate that `xtask` already depends on, with no new
# external dependency.
#
# Required fields per task: id, title, mode, readiness_row, files,
# dependencies, verification, acceptance, stop_condition.
# Required fields per feature: id, title. (tasks may be empty.)
# Required fields per epic: id, title, milestone, readiness_rows.
# Required top-level: [meta].plan, [meta].milestone.
#
# Validation is performed by `cargo run -p xtask -- verify-kanban-backlog`
# which checks unique ids, required fields, and that every dependency
# resolves to an epic, feature, or task in the same file.
#
# Optional per-task fields: `status` (todo | in-progress | done | blocked;
# defaults to todo) and `evidence` (path to the evidence file/command output
# backing the status). A task marked `status = "done"` MUST carry a
# non-empty `evidence` value; the validator rejects done-without-evidence.
#
# Epic mapping to v0.2 milestones: P0→M7, P1-P2→M8, P3-P4→M9, P5→M10, P6→M11, P7-P8→M12, P9→M13

[meta]
plan = ".hermes/plans/2026-06-13_173122-legion-current-to-ga-kanban-plan.md"
milestone = "M8"

