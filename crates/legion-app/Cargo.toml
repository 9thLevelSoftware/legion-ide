[dependencies]
anyhow = { workspace = true }
globset = { workspace = true }
legion-editor = { workspace = true }
legion-index = { workspace = true }
legion-lsp = { workspace = true }
legion-collaboration = { workspace = true }
legion-remote = { workspace = true }
legion-platform = { workspace = true }
legion-project = { workspace = true }
legion-protocol = { workspace = true }
legion-observability = { workspace = true }
legion-security = { workspace = true }
legion-storage = { workspace = true }
legion-terminal = { workspace = true }
legion-ui = { workspace = true }
legion-agent = { workspace = true, optional = true }
legion-ai = { workspace = true, optional = true }
legion-ai-providers = { workspace = true, optional = true }
legion-tracker = { workspace = true }
legion-memory = { workspace = true }
legion-plugin = { workspace = true }
regex = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
serde_json = { workspace = true }
syntect = { workspace = true }
sha2 = "0.10"
hex = "0.4"
