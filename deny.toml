[licenses]
# Phase 8 rustls/keyring review notes:
# - ISC is required by ring/rustls-webpki/untrusted in the reviewed rustls ring-provider graph.
# - CDLA-Permissive-2.0 is required by webpki-root-certs through reqwest's rustls platform verifier.
# - sha2 is used for metadata-only root-store and certificate-pin digest checks; no key material is hashed or logged.
# Phase 2 renderer review notes:
# - BSD-2-Clause, BSL-1.0, Zlib, and CC0-1.0 are OSI/FSF-compatible transitive licenses in the reviewed eframe/egui renderer graph.
# - OFL-1.1 and Ubuntu-font-1.0 are used by epaint's bundled default fonts; they are display assets only and do not expand runtime authority.
# - MPL-2.0 is required by uluru v3.1.0 in the reviewed gix-pack -> gix -> legion-project -> legion-app -> legion-desktop chain; it is OSI/FSF-approved copyleft and is accepted for the cargo-deny phase gate.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MPL-2.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Unlicense",
    "Ubuntu-font-1.0",
    "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "warn"

[licenses.private]
ignore = true

[sources]
# Fail closed on off-policy sources. The workspace resolves entirely from
# crates.io (no git or alternate-registry dependencies); allowlists below
# document the only sanctioned sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
