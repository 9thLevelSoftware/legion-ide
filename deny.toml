###############################################################################
# Milestone-0 baseline policy for cargo-deny.
#
# This baseline enforces dependency governance used by CI gate checks.
###############################################################################

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
unused-ignored-advisory = "warn"
# RUSTSEC-2026-0194 (quick-xml 0.39.4, quadratic-time attribute-duplicate check):
# reached only transitively via plist 1.9.0 <- syntect 5.3.0 (bundled/local
# .tmTheme syntax-highlighting theme parsing, not attacker-controlled network
# XML). plist 1.9.0 is the latest release on crates.io and pins
# `quick-xml = "^0.39.2"`, so no in-repo dependency bump can reach the fixed
# 0.41.0 line (`cargo update -p quick-xml --precise 0.41.0` fails: no matching
# version satisfies plist's constraint). Upstream plist must relax/bump its
# quick-xml pin before this can be resolved from our side. Revisit when plist
# releases a version compatible with quick-xml >=0.41.0.
ignore = ["RUSTSEC-2026-0194"]

[bans]
# Duplicate crate versions fail the gate. The `skip` list below is a REVIEWED
# BASELINE of unavoidable transitive duplicates pulled by third-party crates at
# differing versions (the eframe/egui/wgpu/winit/accesskit GUI stack, the
# objc2/core-foundation Apple stack, the windows-*/redox/linux-raw platform
# crates, the zbus/zvariant D-Bus stack, proc-macro-crate's newer toml_edit, and
# wasmtime's newer toml/serde_spanned/wasm-encoder chain pulled in via
# wasmtime-internal-cache and wast/wat).
# None are direct workspace dependencies at conflicting versions; resolving them
# would require forking upstream. For each duplicated crate the NEWEST version is
# kept as canonical and the older redundant version(s) are skipped. Because the
# baseline is version-pinned, any NEW duplicate (a new crate, or a new version of
# an already-listed crate) still fails the gate and must be reviewed here.
# Re-generate after dependency bumps with: cargo deny check bans
multiple-versions = "deny"
wildcards = "allow"
skip = [
    { crate = "accesskit_consumer@0.35.0" },
    { crate = "bit-set@0.8.0" },
    { crate = "bit-vec@0.8.0" },
    { crate = "bitflags@1.3.2" },
    { crate = "block2@0.5.1" },
    { crate = "calloop@0.13.0" },
    { crate = "calloop-wayland-source@0.3.0" },
    { crate = "core-foundation@0.9.4" },
    { crate = "downcast-rs@1.2.1" },
    { crate = "foldhash@0.1.5" },
    { crate = "getrandom@0.2.17" },
    { crate = "getrandom@0.3.4" },
    { crate = "hashbrown@0.14.5" },
    { crate = "hashbrown@0.15.5" },
    { crate = "hashbrown@0.16.1" },
