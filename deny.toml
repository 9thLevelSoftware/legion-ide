###############################################################################
# Milestone-0 baseline policy for cargo-deny.
#
# This baseline enforces dependency governance used by CI gate checks.
###############################################################################

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
unused-ignored-advisory = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
# Phase 8 rustls/keyring review notes:
# - ISC is required by ring/rustls-webpki/untrusted in the reviewed rustls ring-provider graph.
# - CDLA-Permissive-2.0 is required by webpki-root-certs through reqwest's rustls platform verifier.
# - sha2 is used for metadata-only root-store and certificate-pin digest checks; no key material is hashed or logged.
# Phase 2 renderer review notes:
# - BSD-2-Clause, BSL-1.0, Zlib, and CC0-1.0 are OSI/FSF-compatible transitive licenses in the reviewed eframe/egui renderer graph.
# - OFL-1.1 and Ubuntu-font-1.0 are used by epaint's bundled default fonts; they are display assets only and do not expand runtime authority.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "OFL-1.1",
    "Unicode-3.0",
    "Unlicense",
    "Ubuntu-font-1.0",
    "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "warn"

[licenses.private]
ignore = true

[sources]
unknown-registry = "warn"
unknown-git = "warn"
