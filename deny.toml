###############################################################################
# Milestone-0 baseline policy for cargo-deny.
#
# This baseline enforces dependency governance used by CI gate checks.
###############################################################################

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
unused-ignored-advisory = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "LGPL-2.1-or-later",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
]
confidence-threshold = 0.8
unused-allowed-license = "warn"

[licenses.private]
ignore = true

[sources]
unknown-registry = "warn"
unknown-git = "warn"
