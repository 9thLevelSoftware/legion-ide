# Legion desktop release pipeline (WS17.T1 dry-run scaffold + PKT-SIGN signing paths)
#
# channel: "stable"  -> version = <workspace.package.version>, rollout_policy = "full"
# channel: "preview" -> version = <workspace.package.version>-preview, rollout_policy = "staged"
#
# Signing modes (PKT-SIGN / ADR-0042):
#   --dry-run         : signer_status = "dry-run/no-production-signer", sha256 = "pending"
#   --from-artifacts  : real sha256 computed; signer resolved from [signing] below
#   (neither)         : rejected with a clear error
#
# Signer resolution:
#   source = "env" / "ci-secret": reads base64 32-byte Ed25519 seed from the
#     named environment variable.  Key material stays in the process environment,
#     NOT in the repository.
#   source = "keyring": looks up the OS keyring by service=reference / user=identity.
#   source = "kms": always "KMS signer not yet implemented — honest unavailable".
#
# If the signer is unavailable, the pipeline records
#   signer_status = "unsigned-beta/no-signer-configured"
# and the release-manifest subcommand omits the .sig file.  This is a first-class
# outcome (not an error) — see M5 WS17-T2 unsigned-beta policy.
#
# NEVER put key material in this file — only reference strings.
package_name = "legion-desktop"
dist_tool = "cargo-dist"

# ---------------------------------------------------------------------------
# Signer reference (ADR-0042 / PKT-SIGN) — reference only, no key material.
# ---------------------------------------------------------------------------
# Key format: base64-encoded 32-byte Ed25519 seed.
# Generate a test key:
#   python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
# Export it:
#   export LEGION_SIGNING_KEY=<base64-output>
#
# For production, store the seed in your CI secret store and reference it here
# by name only.  NEVER commit the decoded bytes, the base64 string, or any
# other form of the private key material.

[signing]
source = "env"
reference = "LEGION_SIGNING_KEY"
identity = "legion-ide release signing"

# ---------------------------------------------------------------------------
# Updater strategy (ADR-0042 custom Zed-style updater)
# ---------------------------------------------------------------------------
[updater]
strategy = "custom-zed-style"
manifest = "release-manifest.v1.toml"
signature = "ed25519-detached"

[[installer_targets]]
name = "legion-desktop-macos-x64-dmg"
platform = "macos"
target = "x86_64-apple-darwin"
artifact = "dmg"
build_command = "cargo dist build --target x86_64-apple-darwin"
verification_command = "spctl --assess --type open --context context:primary-signature <artifact>"

[[installer_targets]]
name = "legion-desktop-macos-arm64-dmg"
platform = "macos"
target = "aarch64-apple-darwin"
artifact = "dmg"
build_command = "cargo dist build --target aarch64-apple-darwin"
verification_command = "spctl --assess --type open --context context:primary-signature <artifact>"

[[installer_targets]]
name = "legion-desktop-windows-x64-msi"
platform = "windows"
target = "x86_64-pc-windows-msvc"
artifact = "msi"
build_command = "cargo dist build --target x86_64-pc-windows-msvc"
verification_command = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-windows.ps1 -DryRun"

[[installer_targets]]
name = "legion-desktop-linux-x64-deb"
platform = "linux"
target = "x86_64-unknown-linux-gnu"
artifact = "deb"
build_command = "cargo dist build --target x86_64-unknown-linux-gnu"
verification_command = "dpkg-deb --info <artifact>"

[[installer_targets]]
name = "legion-desktop-linux-x64-rpm"
platform = "linux"
target = "x86_64-unknown-linux-gnu"
artifact = "rpm"
build_command = "cargo dist build --target x86_64-unknown-linux-gnu"
verification_command = "rpm --checksig <artifact>"

[[installer_targets]]
name = "legion-desktop-linux-x64-appimage"
platform = "linux"
target = "x86_64-unknown-linux-gnu"
artifact = "AppImage"
build_command = "cargo dist build --target x86_64-unknown-linux-gnu"
verification_command = "bash scripts/gui-smoke.sh --dry-run"
