audit_areas:
  - id: repo-map
    title: Repository map and gate audit
    scope: Identify workspace crates, scripts, docs, tests, CI workflows, entrypoints, and baseline command health.
    allowed_read_paths:
      - AGENTS.md
      - Cargo.toml
      - crates
      - xtask
      - scripts
      - docs
      - plans
      - .github/workflows
      - deny.toml
      - rust-toolchain.toml
    forbidden_areas:
      - .git
      - target
      - target-clippy-stable
      - node_modules
      - vendor
    source_requirements:
      - Verify the repo matches the Legion plan baseline and CI gates are executable.
      - Do not modify files.
    questions:
      - What crates, binaries, tests, and scripts exist?
      - What gates are required locally and in CI?
      - Are there obvious generated/binary artifacts committed that affect repo hygiene?
    status: ready
  - id: manual-ui-e2e
    title: Manual mode, projection UI, and deterministic IDE flows
    scope: Audit Manual mode exclusion, dock/panel registry, desktop projections, daily editing/search/git/terminal/debug/test workflows, and UI tests.
    allowed_read_paths:
      - AGENTS.md
      - crates/legion-ui
      - crates/legion-desktop
      - crates/legion-app
      - crates/legion-editor
      - crates/legion-text
      - crates/legion-project
      - crates/legion-terminal
      - crates/legion-security
      - plans/legion-e2e/00_CONSOLIDATED_E2E_IMPLEMENTATION_PLAN.md
      - plans/product-readiness-ledger.md
    forbidden_areas:
      - .git
      - target
      - target-clippy-stable
    source_requirements:
      - Phases 1-2 require mode-aware projection shell, Manual AI/network/cloud exclusion, editor/file/search/git/terminal/debug/test workflows, and proposal-mediated saves.
      - Product readiness ledger currently requires working UX paths and tests before product-ready claims.
    questions:
      - Are Manual/deterministic features implemented, partially implemented, stubbed, or missing?
      - Do tests prove Manual mode excludes AI/cloud/worker/hosted telemetry panels?
      - Can daily editing and save flows work e2e without AI?
    status: ready
  - id: ai-delegate-automate-e2e
    title: Assist, Delegate, Automate, workflow, proposal, and provider flows
    scope: Audit Assist, Delegate, Automate, task packets, worker lifecycle, provider routing, proposal-only mutation, validation gates, tracker/memory evidence, and workflow tests.
    allowed_read_paths:
      - AGENTS.md
      - crates/legion-protocol
      - crates/legion-app
      - crates/legion-ai
      - crates/legion-ai-providers
      - crates/legion-agent
      - crates/legion-tracker
      - crates/legion-memory
      - crates/legion-security
      - crates/legion-ui
      - crates/legion-desktop
      - plans/legion-e2e/00_CONSOLIDATED_E2E_IMPLEMENTATION_PLAN.md
      - plans/product-readiness-ledger.md
    forbidden_areas:
      - .git
      - target
      - target-clippy-stable
    source_requirements:
      - Phases 3-6 require DTOs, validators, provider routes, proposal-only output, bounded worker lifecycle, workflow orchestration, and human authority gates.
      - AI/provider/agent code must never directly mutate the main workspace.
    questions:
      - Which Assist/Delegate/Automate requirements are implemented vs stubbed/missing?
      - Are policy, validation, cancellation, and proposal-only guarantees tested?
      - Are provider routes functional through mock or real local-compatible paths?
    status: ready
  - id: cloud-training-release-e2e
    title: Cloud lane, model training flywheel, packaging, release, and docs flows
    scope: Audit cloud lane/client contracts, remote/security policy, model download/worker/training/eval scripts, docs, evidence gates, release/packaging smoke, and CI coverage.
    allowed_read_paths:
      - AGENTS.md
      - crates/legion-remote
      - crates/legion-remote-transport
      - crates/legion-security
      - crates/legion-memory
      - crates/legion-cli
      - scripts
      - config
      - training
      - evals
      - docs
      - plans
      - .github/workflows
    forbidden_areas:
      - .git
      - target
      - target-clippy-stable
    source_requirements:
      - Phases 7-9 require mock cloud lane policy/budget/status/proposal/evidence flow, dry-run reproducible model/training/eval scripts, evidence gates, packaging smoke, and docs.
      - Cloud and raw trace/model-output retention must be opt-in, consent-gated, redacted, and default-deny.
    questions:
      - Are cloud lane and training flywheel flows complete or only dry-run scaffolds?
      - Do scripts actually run in dry-run mode?
      - Are release/packaging/CI evidence gates meaningful and current?
    status: ready

