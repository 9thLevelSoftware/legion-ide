architecture:
  subsystems:
    - id: projection-shell
      name: Projection-only UI and desktop shell
      paths:
        - crates/legion-ui
        - crates/legion-desktop
      responsibilities:
        - Render snapshots and dispatch intents without owning editor/session text.
        - Enforce mode-specific panel visibility.
    - id: app-runtime
      name: App/runtime workflow coordinator
      paths:
        - crates/legion-app
      responsibilities:
        - Own editing/workspace workflows, save proposals, command dispatch, and workflow APIs.
    - id: protocol-policy
      name: Protocol and policy contracts
      paths:
        - crates/legion-protocol
        - crates/legion-security
      responsibilities:
        - Define DTO contracts, route/task/evidence validation, privacy/security policy, and redaction.
    - id: ai-worker-control
      name: AI provider and worker lanes
      paths:
        - crates/legion-ai
        - crates/legion-ai-providers
        - crates/legion-agent
        - crates/legion-tracker
        - crates/legion-memory
      responsibilities:
        - Produce proposals/evidence/metadata without direct main-workspace mutation.
    - id: cloud-training-release
      name: Cloud, training, release, and evidence tooling
      paths:
        - crates/legion-remote
        - crates/legion-cli
        - scripts
        - training
        - evals
        - docs
        - plans
      responsibilities:
        - Provide opt-in cloud lanes, dry-run model/training workflows, evidence gates, and release smoke.
  boundaries:
    - UI must be projection-only; app/runtime owns mutable session/editor/workspace state.
    - Saves must route through proposal-mediated workspace workflow with non-zero correlation/causality.
    - Manual/offline mode must default-deny AI, network, cloud, worker automation, and hosted telemetry.
    - AI/worker/cloud/training lanes must produce proposals, evidence, and metadata unless explicit later policy enables apply.
  data_flows:
    - Editor buffer -> save proposal -> workspace actor -> accepted/rejected outcome -> metadata observability.
    - Mode selection -> panel registry filter -> desktop projection -> command dispatch intent -> app runtime.
    - Task packet -> worker/provider route -> proposal/evidence -> validation/review -> human signoff.
  integration_points:
    - GitHub Actions CI gates.
    - Local cargo gates and xtask dependency policy.
    - Dry-run model/training/eval scripts.

