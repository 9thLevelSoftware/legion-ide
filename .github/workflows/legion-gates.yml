name: Legion Gates

# Standing gate set on every push to main and every pull request, across the
# three supported OSes. Local gates remain the primary verification source
# until this workflow has a proven stable history (see AGENTS.md); a red run
# here is still a merge blocker for the PR that caused it.
#
# Deliberately excluded from v1 of this workflow (documented, not silent):
# - evals/training pytest suite (Python toolchain provisioning; local phase
#   scripts still run it)
# - golden-path smokes (land with the GP-1 xtask command in a separate
#   legion-smoke workflow)
# - perf-harness budgets run in report-only mode on shared runners (timing on
#   hosted VMs is too noisy for a strict wall-clock gate; the report artifact
#   is uploaded and the strict gate stays local)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: legion-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Standing gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libxrandr-dev libxi-dev \
            libxcursor-dev libx11-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libgl1-mesa-dev libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and target
        uses: swatinem/rust-cache@v2

      - name: xtask check-deps
        run: cargo run -p xtask -- check-deps

      - name: xtask docs-hygiene
        run: cargo run -p xtask -- docs-hygiene

      - name: xtask claim-audit
        run: cargo run -p xtask -- claim-audit

      - name: xtask no-egui-textedit
        run: cargo run -p xtask -- no-egui-textedit

      - name: xtask verify-kanban-backlog
        run: cargo run -p xtask -- verify-kanban-backlog

      - name: xtask release-pipeline dry run
        run: cargo run -p xtask -- release-pipeline --dry-run

      - name: xtask verify-release-pipeline
        run: cargo run -p xtask -- verify-release-pipeline

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets --no-fail-fast

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Skeleton microbenchmarks only (workload_kind=skeleton). Hosted budgets are
      # report-only: LEGION_PERF_FAIL_ON_BUDGET_MS=0 disables fail-on-budget so
      # noisy VMs cannot red PRs. Strict budgets remain a local gate.
      - name: xtask perf-harness (report-only skeleton on hosted runners)
        env:
          LEGION_PERF_FAIL_ON_BUDGET_MS: "0"
        run: cargo run -p xtask -- perf-harness

      - name: xtask verify-perf-harness (report-only skeleton on hosted runners)
        env:
          LEGION_PERF_FAIL_ON_BUDGET_MS: "0"
        run: cargo run -p xtask -- verify-perf-harness

      - name: Upload perf-harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-harness-report-${{ matrix.os }}
          path: target/perf-harness/perf_report.toml
          if-no-files-found: warn

      - name: Provision rust-analyzer
        id: provision_ra
        continue-on-error: true
        run: rustup component add rust-analyzer

      - name: xtask rust-analyzer-smoke (real server)
        if: steps.provision_ra.outcome == 'success'
        run: cargo run -p xtask -- rust-analyzer-smoke

      - name: Record skipped rust-analyzer smoke
        if: steps.provision_ra.outcome != 'success'
        run: echo "::warning::rust-analyzer component provisioning failed on ${{ matrix.os }}; real-server smoke skipped this run"

  deny:
    name: cargo-deny (advisories, bans, licenses, sources)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
