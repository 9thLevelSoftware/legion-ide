name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    name: Milestone validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native keyring system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Cache Cargo registry and target
        uses: swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Workspace check
        run: cargo check --workspace --all-targets

      - name: Dependency policy gate
        run: cargo run -p xtask -- check-deps

      - name: GUI Phase 6 Windows package dry run
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-windows.ps1 -DryRun

      - name: GUI Phase 6 smoke dry run (Windows)
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/gui-smoke.ps1 -DryRun

      - name: GUI Phase 6 smoke dry run (Unix)
        if: runner.os != 'Windows'
        run: sh scripts/gui-smoke.sh --dry-run

      - name: GUI Phase 6 evidence gate
        run: cargo run -p devil-cli -- evidence check --phase gui-phase6

      - name: GUI Phase 7 smoke dry run (Windows)
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/gui-smoke.ps1 -Beta -DryRun

      - name: GUI Phase 7 smoke dry run (Unix)
        if: runner.os != 'Windows'
        run: sh scripts/gui-smoke.sh --beta --dry-run

      - name: GUI Phase 7 evidence gate
        run: cargo run -p devil-cli -- evidence check --phase gui-phase7

      - name: GUI Phase 8 smoke dry run (Windows)
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/gui-smoke.ps1 -Phase8 -DryRun

      - name: GUI Phase 8 smoke dry run (Unix)
        if: runner.os != 'Windows'
        run: sh scripts/gui-smoke.sh --phase-8 --dry-run

      - name: GUI Phase 8 evidence gate
        run: cargo run -p devil-cli -- evidence check --phase gui-phase8

      - name: Phase 8 evidence gate
        run: cargo run -p devil-cli -- evidence check --phase phase8

      - name: Cargo deny check
        if: runner.os == 'Linux'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
