name: Legion Bench Recorded

# Recorded mode does NOT open fixture repos or run agents. Task scores are
# synthetic budget arithmetic (scoring_mode=synthetic_budget_arithmetic in the
# report). This workflow proves report shape + verifier integrity, not product
# agent quality. Live provider mode is future M13 scope.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  recorded:
    name: Legion bench recorded weekly (synthetic scoring) (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: swatinem/rust-cache@v2

      - name: Legion bench recorded mode (synthetic scores)
        run: cargo run -p xtask -- legion-bench --mode recorded

      - name: Legion bench verify (report integrity, not agent behavior)
        run: cargo run -p xtask -- verify-legion-bench

      - name: Upload legion bench report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legion-bench-report-${{ matrix.os }}
          path: target/legion-bench/legion_bench_report.toml
          if-no-files-found: warn
